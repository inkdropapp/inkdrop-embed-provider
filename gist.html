<html data-color-mode="light" data-light-theme="light" data-dark-theme="dark">
  <head>
    <title>embed gist</title>
    <meta name="color-scheme" content="light dark" />
    <meta
      http-equiv="Content-Security-Policy"
      content="script-src 'self' 'unsafe-inline' https://gist.github.com;"
    />
    <!--
      GitHub's gist embed stylesheet references Primer design tokens
      (--fontStack-*, --fgColor-*, --bgColor-*, ...) without defining them —
      they only exist on github.com pages. These files are vendored unmodified
      from @primer/primitives@11.9.0 (dist/css). The light/dark themes are
      scoped to the data-color-mode / data-*-theme attributes on <html>.
    -->
    <link rel="stylesheet" href="./primer/base-size.css" />
    <link rel="stylesheet" href="./primer/base-typography.css" />
    <link rel="stylesheet" href="./primer/typography.css" />
    <link rel="stylesheet" href="./primer/radius.css" />
    <link rel="stylesheet" href="./primer/border.css" />
    <link rel="stylesheet" href="./primer/light.css" />
    <link rel="stylesheet" href="./primer/dark.css" />
    <style>
      html,
      body {
        background: transparent;
      }
      body {
        overflow: hidden;
      }
    </style>
    <!--
      The gist embed stylesheet hardcodes a few light-only colors (chrome
      borders, .gist-meta background, .pl-* syntax colors) instead of using
      tokens. Remap them to Primer tokens so they follow the active color
      mode. Scoped under `body .gist` to out-specify the embed stylesheet,
      which is injected later in the DOM.
    -->
    <style>
      body .gist {
        .gist-file {
          border-color: var(--borderColor-default);
        }
        .gist-data {
          border-bottom-color: var(--borderColor-default);
        }
        .gist-meta {
          background-color: var(--bgColor-muted);

          a {
            color: var(--fgColor-accent);
          }
        }
        .highlight {
          color: var(--fgColor-default);
        }
        .pl-c,
        .pl-c span {
          color: var(--color-prettylights-syntax-comment);
        }
        .pl-c1,
        .pl-s .pl-v {
          color: var(--color-prettylights-syntax-constant);
        }
        .pl-e,
        .pl-en {
          color: var(--color-prettylights-syntax-entity);
        }
        .pl-smi,
        .pl-s .pl-s1 {
          color: var(--color-prettylights-syntax-storage-modifier-import);
        }
        .pl-ent {
          color: var(--color-prettylights-syntax-entity-tag);
        }
        .pl-k {
          color: var(--color-prettylights-syntax-keyword);
        }
        .pl-s,
        .pl-pds,
        .pl-s .pl-pse .pl-s1,
        .pl-sr,
        .pl-sr .pl-cce,
        .pl-sr .pl-sre,
        .pl-sr .pl-sra {
          color: var(--color-prettylights-syntax-string);
        }
        .pl-v,
        .pl-smw {
          color: var(--color-prettylights-syntax-variable);
        }
        .pl-bu {
          color: var(--color-prettylights-syntax-brackethighlighter-unmatched);
        }
        .pl-ii {
          color: var(--color-prettylights-syntax-invalid-illegal-text);
          background-color: var(--color-prettylights-syntax-invalid-illegal-bg);
        }
        .pl-c2 {
          color: var(--color-prettylights-syntax-carriage-return-text);
          background-color: var(--color-prettylights-syntax-carriage-return-bg);
        }
        .pl-sr .pl-cce {
          font-weight: bold;
          color: var(--color-prettylights-syntax-string-regexp);
        }
        .pl-ml {
          color: var(--color-prettylights-syntax-markup-list);
        }
        .pl-mh,
        .pl-mh .pl-en,
        .pl-ms {
          font-weight: bold;
          color: var(--color-prettylights-syntax-markup-heading);
        }
        .pl-mi {
          font-style: italic;
          color: var(--color-prettylights-syntax-markup-italic);
        }
        .pl-mb {
          font-weight: bold;
          color: var(--color-prettylights-syntax-markup-bold);
        }
        .pl-md {
          color: var(--color-prettylights-syntax-markup-deleted-text);
          background-color: var(--color-prettylights-syntax-markup-deleted-bg);
        }
        .pl-mi1 {
          color: var(--color-prettylights-syntax-markup-inserted-text);
          background-color: var(--color-prettylights-syntax-markup-inserted-bg);
        }
        .pl-mc {
          color: var(--color-prettylights-syntax-markup-changed-text);
          background-color: var(--color-prettylights-syntax-markup-changed-bg);
        }
        .pl-mi2 {
          color: var(--color-prettylights-syntax-markup-ignored-text);
          background-color: var(--color-prettylights-syntax-markup-ignored-bg);
        }
        .pl-mdr {
          font-weight: bold;
          color: var(--color-prettylights-syntax-meta-diff-range);
        }
        .pl-ba {
          color: var(--color-prettylights-syntax-brackethighlighter-angle);
        }
        .pl-sg {
          color: var(--color-prettylights-syntax-sublimelinter-gutter-mark);
        }
        .pl-corl {
          text-decoration: underline;
          color: var(--color-prettylights-syntax-constant-other-reference-link);
        }
      }
    </style>
  </head>
  <body>
    <script>
      var LOG = false;
      var writes = null;
      var docWrite, docWriteln; // original document.write / writeln
      var tempDocWriteln = function (str) {
        tempDocWrite(str + "\n");
      };

      function tempDocWrite() {
        var args = arguments;

        if (args && args[0]) {
          LOG && console.log("document.write() args[0] = ", args[0]);
          if (!writes) writes = [];
          writes.push(args[0]);
        } else {
          LOG && console.log("document.write() unexpected args = ", args);
        }
      }

      function overrideDocWrites() {
        if (!docWrite) docWrite = document.write;
        if (!docWriteln) docWriteln = document.writeln;
        document.write = tempDocWrite;
        document.writeln = tempDocWriteln;
      }

      function handleScriptLoaded() {
        if (writes) {
          LOG &&
            console.log(
              "handleScriptLoaded() writeArray.len = ",
              writes.length,
            );
          const el = document.querySelector("#gist");
          el.innerHTML = writes.join("");
          // GitHub's embed markup pins data-color-mode="light" on
          // .gist-file; strip it so the subtree follows <html>'s color mode.
          el.querySelectorAll("[data-color-mode]").forEach(function (node) {
            node.removeAttribute("data-color-mode");
            node.removeAttribute("data-light-theme");
            node.removeAttribute("data-dark-theme");
          });
        }
        writes = [];
      }

      overrideDocWrites();
    </script>

    <script>
      var query = new URLSearchParams(window.location.search);
      var url = query.get("url");

      if (query.get("theme") === "dark") {
        document.documentElement.dataset.colorMode = "dark";
      }

      var el = document.createElement("script");
      el.src = url + ".js";
      document.body.appendChild(el);
      el.onload = handleScriptLoaded;
    </script>

    <div id="gist" />

    <script src="./common.js"></script>
  </body>
</html>
